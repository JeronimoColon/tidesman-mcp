<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 560" role="img" aria-label="How Tidesman works: an AI client connects over MCP to Tidesman, which talks directly to Apple's container apiserver to run Linux containers in lightweight VMs.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#08243b"/>
      <stop offset="1" stop-color="#061a2c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff9f3c"/>
      <stop offset="1" stop-color="#ffdd92"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#0E3140"/>
      <stop offset="1" stop-color="#0A2632"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#41869a"/>
    </marker>
  </defs>

  <rect x="6" y="6" width="1228" height="548" rx="26" fill="url(#bg)" stroke="#15333f"/>

  <text x="52" y="62" fill="#ffbf6b" font-size="13" letter-spacing="3" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">HOW IT WORKS</text>
  <text x="52" y="98" fill="#D6EEF2" font-size="22" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">Tidesman talks straight to Apple’s container engine.</text>
  <text x="52" y="124" fill="#6f9aa8" font-size="14" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">No command-line scraping: it speaks to the apiserver directly, the way Apple’s own client does.</text>

  <path d="M150 318 H1110" stroke="#123642" stroke-width="2" stroke-dasharray="2 9" stroke-linecap="round" opacity="0.8"/>

  <line x1="266" y1="318" x2="368" y2="318" stroke="#2c5867" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="316" y="300" fill="#7fb3c0" font-size="12.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">MCP · stdio</text>

  <line x1="644" y1="318" x2="746" y2="318" stroke="#2c5867" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="694" y="300" fill="#7fb3c0" font-size="12.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">XPC</text>

  <line x1="968" y1="318" x2="1018" y2="318" stroke="#2c5867" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="992" y="300" fill="#7fb3c0" font-size="12" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">runs</text>

  <g filter="url(#soft)">
    <rect x="50" y="250" width="216" height="138" rx="18" fill="#0F2A38" stroke="#1E4756"/>
  </g>
  <text x="158" y="304" text-anchor="middle" fill="#E6F2F4" font-size="20" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">AI assistant</text>
  <text x="158" y="332" text-anchor="middle" fill="#84AEBC" font-size="12.5" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">Claude Desktop · Claude Code</text>
  <text x="158" y="352" text-anchor="middle" fill="#5d8694" font-size="12.5" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">· any MCP client</text>

  <g filter="url(#glow)">
    <rect x="368" y="216" width="276" height="206" rx="20" fill="url(#hero)" stroke="#ff9f3c" stroke-width="1.5"/>
  </g>
  <text x="506" y="262" text-anchor="middle" fill="#FFFFFF" font-size="27" font-weight="700" letter-spacing="0.3" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">Tidesman</text>
  <text x="506" y="286" text-anchor="middle" fill="#ffbf6b" font-size="12.5" letter-spacing="0.4" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">MCP SERVER</text>
  <g font-size="12" font-weight="600" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">
    <rect x="396" y="312" width="92" height="26" rx="13" fill="rgba(45,212,191,0.10)" stroke="#2DD4BF"/>
    <text x="442" y="329" fill="#7EE8DE">read-only</text>
    <rect x="496" y="312" width="56" height="26" rx="13" fill="rgba(56,189,248,0.10)" stroke="#38BDF8"/>
    <text x="524" y="329" fill="#9AD8F7">safe</text>
    <rect x="560" y="312" width="52" height="26" rx="13" fill="rgba(245,158,11,0.10)" stroke="#F59E0B"/>
    <text x="586" y="329" fill="#F6C572">full</text>
  </g>
  <text x="506" y="360" text-anchor="middle" fill="#5d8694" font-size="11.5" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">safe by default, opt up with --mode</text>
  <g>
    <rect x="430" y="378" width="152" height="24" rx="12" fill="#0A222C" stroke="#235565"/>
    <circle cx="448" cy="390" r="3.5" fill="#2DD4BF"/>
    <text x="462" y="394" fill="#9fc7d1" font-size="11.5" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">every call audited</text>
  </g>

  <g filter="url(#soft)">
    <rect x="752" y="250" width="216" height="138" rx="18" fill="#0F2A38" stroke="#1E4756"/>
  </g>
  <text x="860" y="300" text-anchor="middle" fill="#E6F2F4" font-size="20" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">Apple container</text>
  <text x="860" y="326" text-anchor="middle" fill="#84AEBC" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">apiserver</text>
  <text x="860" y="348" text-anchor="middle" fill="#5d8694" font-size="12" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">the background engine</text>

  <g fill="#0F2A38" stroke="#2DD4BF" stroke-opacity="0.55">
    <rect x="1086" y="262" width="62" height="62" rx="14"/>
    <rect x="1064" y="284" width="62" height="62" rx="14" fill="#11303E"/>
    <rect x="1042" y="306" width="62" height="62" rx="14" fill="#133A49"/>
  </g>
  <g stroke="#5fe3d6" stroke-width="1.6" fill="none" stroke-opacity="0.85">
    <rect x="1056" y="324" width="34" height="26" rx="4"/>
    <line x1="1056" y1="333" x2="1090" y2="333"/>
  </g>
  <text x="1085" y="402" text-anchor="middle" fill="#cfe9ee" font-size="14" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">Linux containers</text>
  <text x="1085" y="421" text-anchor="middle" fill="#5d8694" font-size="11.5" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">each in a lightweight VM</text>

  <text x="52" y="520" fill="#3c6675" font-size="12" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">Apple Silicon · macOS 26 · stdio only, no network listener.</text>
</svg>
